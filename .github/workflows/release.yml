name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  VPK_VERSION: "1.2.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            channel: win
            mainExe: CrossdexBar.App.exe
            icon: src/CrossdexBar.App/Assets/avalonia-logo.ico
          - os: ubuntu-latest
            rid: linux-x64
            channel: linux
            mainExe: CrossdexBar.App
            icon: src/CrossdexBar.App/Assets/avalonia-logo.png
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CrossdexBar.slnx

      - name: Test
        run: dotnet test CrossdexBar.slnx -c Release --no-restore

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish
        # No -p:PublishSingleFile: Velopack's packer needs a normal multi-file publish
        # folder as input to compute per-file delta updates between versions. It still
        # produces a single user-facing artifact (Setup.exe / one .AppImage) either way.
        run: >
          dotnet publish src/CrossdexBar.App/CrossdexBar.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:DebugType=none
          -p:Version=${{ env.VERSION }}
          -o publish/${{ matrix.rid }}

      - name: Remove bundled debug symbols
        shell: bash
        run: rm -f publish/${{ matrix.rid }}/*.pdb

      - name: Install vpk
        run: dotnet tool install -g vpk --version ${{ env.VPK_VERSION }}

      - name: Pack with Velopack
        shell: bash
        run: >
          vpk pack -u CrossdexBar -v ${{ env.VERSION }} -c ${{ matrix.channel }}
          -p publish/${{ matrix.rid }} -e ${{ matrix.mainExe }}
          --packTitle "CrossdexBar" --packAuthors "NickMarcha"
          --icon ${{ matrix.icon }}
          -o velopack-out/${{ matrix.rid }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: velopack-out/${{ matrix.rid }}/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          # Deliberately not merge-multiple: each RID's Velopack channel (win/linux) needs
          # its own release-feed manifest and assets, so they must stay in separate directories.

      - name: Install vpk
        run: dotnet tool install -g vpk --version ${{ env.VPK_VERSION }}

      - name: Upload win channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          vpk upload github --repoUrl https://github.com/NickMarcha/CrossDexBar
          --channel win --tag "$GITHUB_REF_NAME" --releaseName "CrossdexBar $GITHUB_REF_NAME"
          --publish --merge --token "$GH_TOKEN"
          -o artifacts/release-win-x64

      - name: Upload linux channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          vpk upload github --repoUrl https://github.com/NickMarcha/CrossDexBar
          --channel linux --tag "$GITHUB_REF_NAME" --releaseName "CrossdexBar $GITHUB_REF_NAME"
          --publish --merge --token "$GH_TOKEN"
          -o artifacts/release-linux-x64
